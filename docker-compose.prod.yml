version: "3.9"

services:
  postgres:
    restart: always

  redis:
    restart: always

  minio:
    restart: always

  backend:
    command: >
      gunicorn app.main:app
      --worker-class uvicorn.workers.UvicornWorker
      --workers 4
      --bind 0.0.0.0:8000
    volumes: []
    restart: always

  frontend:
    volumes: []
    restart: always

  nginx:
    restart: always

  celery-worker:
    restart: always

  celery-beat:
    restart: always
